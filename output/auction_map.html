<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경매 물건 지도 (샘플)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', sans-serif; }
    #map { width: 100%; height: 100vh; }
    #panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      background: rgba(255,255,255,0.93);
      padding: 8px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      font-size: 13px;
      font-weight: bold;
      color: #1F4E79;
    }
    .iw-wrap {
      padding: 10px 30px 10px 12px;
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 13px;
      min-width: 200px;
      max-width: 300px;
      position: relative;
    }
    .iw-close {
      position: absolute;
      top: 6px;
      right: 8px;
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #888;
      line-height: 1;
      padding: 2px;
    }
    .iw-close:hover { color: #333; }
    .iw-table { border-collapse: collapse; width: 100%; margin-top: 4px; }
    .iw-table th {
      text-align: left;
      padding: 2px 10px 2px 0;
      color: #666;
      white-space: nowrap;
      vertical-align: top;
      font-weight: normal;
    }
    .iw-table td {
      padding: 2px 0;
      color: #222;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    총 5건 | 지도 표시: <span id="mapped-count">0</span>건
  </div>

  <script>
    var ITEMS = [{"addr": "경기도 수원시 팔달구 효원로 1", "사건번호": "2024타경10001", "물건번호": "1", "물건주소": "경기도 수원시 팔달구 효원로 1", "용도": "아파트", "감정평가액": "500,000,000", "최저입찰가_표시": "350,000,000(70%)", "입찰기일": "2024-03-15", "진행상태": "진행중"}, {"addr": "경기도 수원시 영통구 영통로 234", "사건번호": "2024타경10002", "물건번호": "1", "물건주소": "경기도 수원시 영통구 영통로 234", "용도": "아파트", "감정평가액": "450,000,000", "최저입찰가_표시": "315,000,000(70%)", "입찰기일": "2024-03-22", "진행상태": "진행중"}, {"addr": "경기도 수원시 권선구 권선로 921", "사건번호": "2024타경10003", "물건번호": "1", "물건주소": "경기도 수원시 권선구 권선로 921", "용도": "아파트", "감정평가액": "380,000,000", "최저입찰가_표시": "266,000,000(70%)", "입찰기일": "2024-04-05", "진행상태": "유찰"}, {"addr": "경기도 용인시 기흥구 구성로 357", "사건번호": "2024타경10004", "물건번호": "1", "물건주소": "경기도 용인시 기흥구 구성로 357", "용도": "근린시설", "감정평가액": "980,000,000", "최저입찰가_표시": "686,000,000(70%)", "입찰기일": "2024-04-14", "진행상태": "진행중"}, {"addr": "경기도 화성시 동탄반석로 142", "사건번호": "2024타경10005", "물건번호": "1", "물건주소": "경기도 화성시 동탄반석로 142", "용도": "아파트", "감정평가액": "620,000,000", "최저입찰가_표시": "434,000,000(70%)", "입찰기일": "2024-04-19", "진행상태": "진행중"}];

    function initMap() {
      var mapContainer = document.getElementById('map');
      var map = new kakao.maps.Map(mapContainer, {
        center: new kakao.maps.LatLng(37.2636, 127.0286),
        level: 7
      });

      map.addControl(new kakao.maps.ZoomControl(),    kakao.maps.ControlPosition.RIGHT);
      map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

      var geocoder  = new kakao.maps.services.Geocoder();
      var clusterer = new kakao.maps.MarkerClusterer({
        map: map,
        averageCenter: true,
        minLevel: 4
      });

      var currentIW = null;
      var mappedCount = 0;
      var bounds = new kakao.maps.LatLngBounds();
      var markerList = [];

      // InfoWindow 닫기 (전역 함수 - 인라인 onclick에서 호출)
      window.closeIW = function() {
        if (currentIW) { currentIW.close(); currentIW = null; }
      };

      function buildContent(item) {
        var LABELS = {
          '사건번호':      '사건번호',
          '법원':          '법원',
          '물건번호':      '물건번호',
          '물건주소':      '주소',
          '소재지':        '주소',
          '주소':          '주소',
          '물건소재지':    '주소',
          '용도':          '용도',
          '감정평가액':    '감정가',
          '감정가':        '감정가',
          '최저입찰가_표시': '최저매각가',
          '최저입찰가':    '최저매각가',
          '최저매각가':    '최저매각가',
          '입찰기일':      '매각기일',
          '매각기일':      '매각기일',
          '진행상태':      '상태',
          '상태':          '상태',
          '유찰횟수':      '유찰횟수',
        };
        // 중복 레이블 제거
        var seen = {};
        var rows = '';
        Object.keys(LABELS).forEach(function(key) {
          var label = LABELS[key];
          if (item[key] && !seen[label]) {
            seen[label] = true;
            rows += '<tr><th>' + label + '</th><td>' + item[key] + '</td></tr>';
          }
        });
        return '<div class="iw-wrap">'
             + '<button class="iw-close" onclick="closeIW()">✕</button>'
             + '<table class="iw-table">' + rows + '</table>'
             + '</div>';
      }

      function addMarker(item, lat, lng) {
        var pos    = new kakao.maps.LatLng(lat, lng);
        var marker = new kakao.maps.Marker({ position: pos });
        var iw     = new kakao.maps.InfoWindow({
          content: buildContent(item),
          removable: false
        });

        kakao.maps.event.addListener(marker, 'click', function() {
          closeIW();
          iw.open(map, marker);
          currentIW = iw;
        });

        markerList.push(marker);
        bounds.extend(pos);
        mappedCount++;
        document.getElementById('mapped-count').textContent = mappedCount;
      }

      // 순차 geocoding (카카오 API 부하 분산)
      var idx = 0;
      function processNext() {
        if (idx >= ITEMS.length) {
          // 모두 완료 후 bounds 조정
          clusterer.addMarkers(markerList);
          if (markerList.length > 0) {
            map.setBounds(bounds);
          }
          return;
        }
        var item = ITEMS[idx++];
        geocoder.addressSearch(item.addr, function(result, status) {
          if (status === kakao.maps.services.Status.OK) {
            addMarker(item, result[0].y, result[0].x);
          }
          // 다음 아이템 처리 (50ms 간격으로 부하 분산)
          setTimeout(processNext, 50);
        });
      }

      processNext();
    }
  </script>
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=614ddc420a052c47f1b0a7eb2169d862&libraries=services,clusterer&autoload=false">
  </script>
  <script>
    kakao.maps.load(initMap);
  </script>
</body>
</html>
